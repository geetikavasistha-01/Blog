{% extends "base.html" %}

{% block title %}{{ status_code }} — Error{% endblock %}

{% block content %}
<section class="error-page">
  <div class="error-code-wrap">
    <span class="error-code">{{ status_code }}</span>
  </div>
  <div class="error-content">
    <p class="error-label">// something went wrong</p>
    <h1 class="error-title">An <em>error</em><br>occurred</h1>
    <p class="error-body">{{ detail }}</p>
    <div class="error-actions">
      <a href="/" class="error-btn-primary">← Back to Writing</a>
    </div>
  </div>
</section>
{% endblock %}
